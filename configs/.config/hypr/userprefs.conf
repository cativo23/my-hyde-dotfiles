# ‚Ėą‚ĖĄ‚Ėą ‚ĖĄ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖÄ‚ĖĄ   ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖÄ‚ĖĎ ‚ĖĄ‚Ėą

# Set your personal hyprland configuration here
# See https://wiki.hyprland.org/Configuring for more information

# // ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ
# // ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖĄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ


#  Uncomment to enable // change to a preferred value
# ūüĒó See https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = latam,us
    # follow_mouse = 1
    # sensitivity = 0
    # force_no_accel = 0
    # accel_profile = flat
    # numlock_by_default = true

    # ūüĒó See https://wiki.hyprland.org/Confi1guring/Variables/#touchpad
    touchpad {
        natural_scroll = yes
        scroll_factor = 0.15
    }

}




# for window shallow similar to devour
misc {
    enable_swallow = true
    swallow_regex = (foot|kitty|alacritty|Alacritty|ghostty|Ghostty|org.wezfurlong.wezterm)
}

# Don't show update on first launch
ecosystem {
    no_update_news = true
}

# Propagate env vars to D-Bus (needed for gnome-keyring on Hyprland)
exec-once = dbus-update-activation-environment --all

# Start GNOME Keyring daemon
exec-once = eval $(gnome-keyring-daemon --start --components=secrets,pkcs11)

# Switch keyboard layout with Super + Space
bind = SUPER, space, exec, hyprctl switchxkblayout all next && sleep 0.1 && notify-send -t 2000 "Keyboard" "$(hyprctl devices -j | grep -oP '"active_keymap": "\K[^"]+' | head -1)"

# Lid switch - lock and suspend
bindl = , switch:on:Lid Switch, exec, systemctl suspend
