name: CI - Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bash syntax check
        run: |
          bash -n setup.sh
          echo "All scripts pass syntax check"

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run shellcheck
        run: |
          shellcheck --severity=warning setup.sh

  functional-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test dry-run execution
        run: |
          chmod +x setup.sh
          ./setup.sh --dry-run | tee /tmp/dryrun.log
          # Validate expected steps appear (case-insensitive)
          grep -qi "would backup\|backup current configs" /tmp/dryrun.log || { echo "Missing backup step in output"; cat /tmp/dryrun.log; exit 1; }
          grep -qi "waybar" /tmp/dryrun.log || { echo "Missing waybar step in output"; cat /tmp/dryrun.log; exit 1; }
          grep -qi "install\|instalando" /tmp/dryrun.log || { echo "Missing install step in output"; cat /tmp/dryrun.log; exit 1; }
          echo "Dry-run test passed"

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v11
        with:
          globs: |
            README.md
            CHANGELOG.md
            AGENTS.md
            CONTRIBUTING.md
            SECURITY.md
          config: .markdownlint.jsonc
